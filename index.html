<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天敵占い - 対モンスターサバイバル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', 'Noto Sans JP', sans-serif; 
            background-color: #09090b; /* Zinc 950 */
            color: #f4f4f5; /* Zinc 100 */
        }
        
        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(24, 24, 27, 0.4); /* Zinc 900 / 40% */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* Glowing background effects */
        .bg-glow-purple {
            position: fixed;
            top: -10%; left: -10%;
            width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, rgba(9,9,11,0) 70%);
            z-index: -1;
            pointer-events: none;
        }
        .bg-glow-indigo {
            position: fixed;
            bottom: -20%; right: -10%;
            width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(79,70,229,0.1) 0%, rgba(9,9,11,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* Animations */
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
            20%, 40%, 60%, 80% { transform: translateX(4px); }
        }
        .animate-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        /* HP Bar Segment Transitions */
        .hp-segment { transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* Custom Scrollbar for sleekness */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
        
        /* Sleek Inputs */
        .sleek-input {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        .sleek-input:focus {
            background: rgba(0,0,0,0.4);
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }
    </style>
</head>
<body class="flex justify-center min-h-screen overflow-x-hidden selection:bg-purple-500/30">

    <!-- Ambient Background Glow -->
    <div class="bg-glow-purple"></div>
    <div class="bg-glow-indigo"></div>

    <div class="w-full max-w-md relative flex flex-col min-h-screen">
        
        <!-- Header -->
        <header class="p-6 pb-2 text-center relative z-10 flex justify-between items-center">
            <div class="w-10"></div>
            <div>
                <h1 class="text-xl font-black tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-indigo-400">ENEMY FORTUNE<span class="text-xs ml-2 font-medium tracking-normal text-zinc-400">天敵占い</span></h1>
            </div>
            <button onclick="toggleSettings()" class="w-10 h-10 flex items-center justify-center rounded-full glass-panel hover:bg-white/5 transition duration-300 text-zinc-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>
        </header>

        <main class="flex-1 p-5 overflow-y-auto pb-10 space-y-6" id="main-content">
            
            <!-- HP Section -->
            <section class="glass-panel rounded-2xl p-5">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-xs font-bold text-zinc-400 tracking-wider uppercase flex items-center">
                        <span class="w-2 h-2 rounded-full bg-green-400 mr-2 shadow-[0_0_8px_rgba(74,222,128,0.8)]"></span> Mental HP
                    </h2>
                    <span id="hp-text" class="text-xs font-bold font-mono text-zinc-300">100 / 100</span>
                </div>
                <!-- HP Bar -->
                <div class="w-full bg-black/40 rounded-full h-3 mb-5 border border-white/5 overflow-hidden relative">
                    <div id="hp-bar" class="bg-gradient-to-r from-green-400 to-emerald-400 h-full rounded-full w-full hp-segment"></div>
                </div>
                <!-- Healing action output display -->
                <div id="healing-suggestion" class="hidden mb-4 p-3 bg-purple-900/40 border border-purple-500/30 rounded-xl text-xs text-purple-200 leading-relaxed font-bold animate-pulse-slow">
                </div>
                <button onclick="takeDamage()" class="w-full hover:bg-white/10 border border-white/10 text-zinc-300 text-sm font-medium py-3 px-4 rounded-xl transition duration-300 active:scale-[0.98] flex items-center justify-center group relative overflow-hidden bg-zinc-800">
                    <div class="absolute inset-0 bg-red-500/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <span class="group-hover:text-red-400 transition-colors duration-300 relative z-10">⚡ ダメージを報告 (-10)</span>
                </button>
            </section>

            <!-- Profiling (Registration) Section -->
            <section id="profiling-section" class="glass-panel rounded-3xl p-6 relative mt-2 animate-slide-up overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-purple-500 via-indigo-500 to-blue-500 opacity-50"></div>
                
                <h2 class="text-sm text-zinc-100 font-bold mb-6 flex items-center tracking-wide">
                    Astrological Profiling
                </h2>
                
                <div class="space-y-6">
                    <!-- User Info Section -->
                    <div class="bg-indigo-900/20 p-4 rounded-2xl border border-indigo-500/20 space-y-4">
                        <h3 class="text-xs font-bold text-indigo-300 uppercase tracking-widest flex items-center">
                            <span class="mr-2">👤</span> あなたの情報
                        </h3>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] font-semibold text-zinc-500 mb-1 uppercase tracking-widest">Name</label>
                                <input type="text" id="user-name" placeholder="名無し" class="sleek-input w-full text-zinc-100 rounded-lg p-2.5 text-sm outline-none">
                            </div>
                            <div>
                                <label class="block text-[10px] font-semibold text-zinc-500 mb-1 uppercase tracking-widest">Birthday</label>
                                <input type="date" id="user-birthday" class="sleek-input w-full text-zinc-100 rounded-lg p-2.5 text-sm outline-none" value="1990-01-01">
                            </div>
                        </div>
                    </div>

                    <!-- Enemy Info Section -->
                    <div class="bg-red-900/10 p-4 rounded-2xl border border-red-500/20 space-y-4">
                        <h3 class="text-xs font-bold text-red-400 uppercase tracking-widest flex items-center">
                            <span class="mr-2">👺</span> 天敵の情報
                        </h3>
                        <div>
                            <label class="block text-[10px] font-semibold text-zinc-500 mb-1 uppercase tracking-widest">Name</label>
                            <input type="text" id="enemy-name" placeholder="マウンティング・ゴリラ先輩" class="sleek-input w-full text-zinc-100 rounded-lg p-2.5 text-sm outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-semibold text-zinc-500 mb-1 uppercase tracking-widest">Birthday</label>
                            <input type="date" id="enemy-birthday" class="sleek-input w-full text-zinc-100 rounded-lg p-2.5 text-sm outline-none" value="1985-05-05">
                        </div>
                    </div>

                    <div class="pt-4">
                        <button onclick="generateFortune()" id="generate-btn" class="w-full bg-zinc-100 hover:bg-white text-zinc-900 font-bold py-4 px-6 rounded-xl shadow-[0_0_20px_rgba(255,255,255,0.15)] transition duration-300 transform hover:-translate-y-1 active:scale-[0.98] flex justify-center items-center group">
                            <span class="group-hover:rotate-12 transition-transform duration-300 mr-2">🔮</span> 天敵予報を受信する
                        </button>
                        <p id="api-warning" class="text-xs text-red-400/80 text-center hidden mt-4 font-medium">※設定(⚙️)からAPIキーを登録してください</p>
                    </div>
                </div>
            </section>

            <!-- Loading State -->
            <div id="loading-state" class="hidden flex-col items-center justify-center py-20 space-y-8 glass-panel rounded-3xl animate-slide-up relative overflow-hidden">
                <!-- Inner rotating glowing border effect -->
                <div class="absolute inset-0 bg-gradient-to-r from-purple-500/10 to-indigo-500/10 animate-pulse-slow"></div>
                
                <div class="relative w-16 h-16">
                    <div class="absolute inset-0 border-t-2 border-purple-500 border-solid rounded-full animate-spin"></div>
                    <div class="absolute inset-2 border-r-2 border-indigo-400 border-solid rounded-full animate-spin" style="animation-direction: reverse; animation-duration: 1.5s;"></div>
                    <div class="absolute inset-0 flex items-center justify-center text-xl text-yellow-500">✨</div>
                </div>
                
                <div class="text-center relative z-10">
                    <p class="text-xs text-purple-300 font-bold uppercase tracking-[0.2em] mb-2">Astrology Engine</p>
                    <p class="text-sm text-zinc-400">星回りとバイオリズムを計算中...</p>
                </div>
            </div>

            <!-- Result Area -->
            <div id="result-area" class="hidden space-y-6">
                
                <!-- Dashboard -->
                <section class="glass-panel rounded-3xl p-6 relative overflow-hidden animate-slide-up" style="animation-delay: 0.1s;">
                    <div class="absolute left-0 top-0 h-full w-1 bg-gradient-to-b from-indigo-500 to-purple-500"></div>
                    
                    <h2 class="text-xs text-zinc-500 mb-1 font-bold uppercase tracking-widest flex items-center justify-between">
                        <span>🌤️ 今日の天敵・天気予報</span>
                        <span id="date-display" class="font-mono text-[10px] opacity-70"></span>
                    </h2>
                    <div class="mb-5 mt-2">
                        <span id="danger-level" class="text-xl md:text-2xl font-black text-indigo-300 tracking-tight leading-snug"></span>
                    </div>
                    
                    <div class="pt-4 border-t border-white/5">
                        <h3 class="text-xs text-zinc-400 mb-3 font-bold uppercase tracking-widest"><span class="text-yellow-400 mr-1">✦</span> 詳細な星回り</h3>
                        <p id="enemy-prediction" class="text-sm text-zinc-100 leading-relaxed font-medium bg-black/20 p-4 rounded-xl border border-white/5"></p>
                    </div>
                </section>

                <section class="glass-panel rounded-3xl p-6 relative overflow-hidden animate-slide-up" style="animation-delay: 0.2s;">
                    <div class="absolute left-0 top-0 h-full w-1 bg-amber-500/80"></div>
                    
                    <h2 class="text-xs text-amber-500/90 font-bold mb-4 uppercase tracking-widest flex items-center">
                        <span class="mr-2">🛡️</span> 今日の回避アクション
                    </h2>
                    <ul id="survival-tips" class="list-none text-zinc-200 text-sm space-y-3 font-medium">
                        <!-- JS injects here -->
                    </ul>
                </section>
                
                <div class="pt-4 animate-slide-up" style="animation-delay: 0.3s;">
                    <button onclick="resetApp()" class="w-full bg-zinc-800 hover:bg-zinc-700 border border-white/10 text-zinc-400 font-medium py-3 px-6 rounded-xl transition duration-300 active:scale-[0.98] flex justify-center items-center">
                        <span class="mr-2">↺</span> プロフィール入力を開き直す
                    </button>
                </div>
            </div>
        </main>

        <!-- API Settings Modal -->
        <div id="settings-modal" class="pointer-events-none absolute inset-0 z-50 flex flex-col justify-end sm:justify-center p-0 sm:p-6 transition-all duration-300 opacity-0 bg-black/60 backdrop-blur-md">
            <div class="glass-panel w-full sm:rounded-3xl rounded-t-3xl p-6 transform translate-y-full sm:translate-y-0 transition-transform duration-300 shadow-2xl" id="settings-panel">
                <div class="w-12 h-1 bg-zinc-700 rounded-full mx-auto mb-6 sm:hidden"></div> <!-- Mobile drag handle -->
                
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold text-zinc-100 tracking-wide">Settings</h2>
                    <button onclick="toggleSettings()" class="text-zinc-500 hover:text-zinc-300 transition w-8 h-8 flex items-center justify-center rounded-full bg-zinc-800 hover:bg-zinc-700">✕</button>
                </div>
                
                <div class="space-y-5">
                    <div class="bg-black/30 p-4 rounded-2xl border border-white/5">
                        <p class="text-xs text-zinc-400 leading-relaxed">
                            OpenAI APIキーは<span class="text-purple-400 font-semibold">ブラウザ内にのみ保存</span>され、外部サーバーには送信されません。
                        </p>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-zinc-500 mb-2 uppercase tracking-widest">API Key</label>
                        <input type="password" id="api-key-input" placeholder="sk-proj-..." class="sleek-input w-full text-zinc-100 rounded-xl p-3.5 font-mono text-sm outline-none">
                    </div>
                    <button onclick="saveApiKey()" class="w-full bg-gradient-to-r from-zinc-800 to-zinc-700 hover:from-zinc-700 hover:to-zinc-600 text-zinc-100 font-bold py-3.5 mt-2 rounded-xl transition shadow-lg active:scale-[0.98] border border-white/10">
                        Save Configuration
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Set today's date dynamically
        const dateObj = new Date();
        const y = dateObj.getFullYear();
        const m = String(dateObj.getMonth() + 1).padStart(2, '0');
        const d = String(dateObj.getDate()).padStart(2, '0');
        const dateStr = y + "." + m + "." + d;
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('date-display').innerText = dateStr;
        });

        // Current saved astrology context (for self-care regeneration)
        let currentAstrologyContext = null;

        // HP Management
        let currentHp = 100;
        const maxHp = 100;

        function updateHpDisplay() {
            const hpBar = document.getElementById('hp-bar');
            const hpText = document.getElementById('hp-text');
            
            hpText.innerText = currentHp + ' / ' + maxHp;
            hpBar.style.width = ((currentHp / maxHp) * 100) + '%';

            // Reset gradient classes
            hpBar.className = "h-full rounded-full w-full hp-segment";

            if (currentHp > 50) {
                hpBar.classList.add("bg-gradient-to-r", "from-green-400", "to-emerald-400");
                hpBar.style.boxShadow = "0 0 10px rgba(52, 211, 153, 0.4)";
            } else if (currentHp > 20) {
                hpBar.classList.add("bg-gradient-to-r", "from-amber-400", "to-orange-400");
                hpBar.style.boxShadow = "0 0 10px rgba(251, 191, 36, 0.4)";
            } else {
                hpBar.classList.add("bg-gradient-to-r", "from-red-500", "to-rose-500", "animate-pulse");
                hpBar.style.boxShadow = "0 0 15px rgba(239, 68, 68, 0.6)";
            }
        }

        async function takeDamage() {
            if (currentHp <= 0) return;
            
            currentHp -= 10;
            if (currentHp < 0) currentHp = 0;
            
            updateHpDisplay();
            
            // Shake effect
            const container = document.body;
            container.classList.remove('animate-shake');
            void container.offsetWidth; // trigger reflow
            container.classList.add('animate-shake');

            // Overlay flash effect
            const flash = document.createElement('div');
            flash.className = 'fixed inset-0 bg-red-500/20 z-40 pointer-events-none transition-opacity duration-300';
            document.body.appendChild(flash);
            setTimeout(() => {
                flash.style.opacity = '0';
                setTimeout(() => flash.remove(), 300);
            }, 50);

            // Hide previous suggestion if any
            const suggestionEl = document.getElementById('healing-suggestion');
            suggestionEl.classList.add('hidden');

            const apiKey = localStorage.getItem('tenteki_api_key');
            if (!apiKey || !currentAstrologyContext) {
                 if (currentHp <= 20) {
                     alert("限界です！今日は美味しいものを食べて直帰してください。");
                 }
                 return;
            }

            // Optional: Request a customized self-care suggestion from AI based on current HP
            if (currentHp <= 60 && currentHp % 20 === 0 || currentHp === 0) {
                suggestionEl.innerText = "✨ バイオリズムに合わせたご褒美を計算中...";
                suggestionEl.classList.remove('hidden');

                const systemPrompt = "あなたは占星術に基づいた心理カウンセラーです。\\n" +
"ユーザーから「職場の天敵にダメージを受けた」という報告を受けました。現在のユーザーのメンタルHPは" + currentHp + "/100です。\\n" +
"本日のユーザーと天敵の誕生日データ（" + JSON.stringify(currentAstrologyContext) + "）を踏まえ、\\n" +
"クスッと笑える、または癒やされる「最適な自分へのご褒美（セルフケア案）」を1〜2文で提案してください。\\n" +
"出力はJSON形式にしてください。\\n" +
"【JSON形式】 { \"careSuggestion\": \"限界近いです。星回り的にラッキーアイテムの『高級アイス』を買って直帰してください\" }";

                 try {
                    const response = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + apiKey
                        },
                        body: JSON.stringify({
                            model: "gpt-4o-mini",
                            messages: [
                                { role: "system", content: systemPrompt },
                                { role: "user", content: "ダメージを受けました。最適なご褒美を提案して。" }
                            ],
                            response_format: { type: "json_object" },
                            temperature: 0.8,
                            max_tokens: 200
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const result = JSON.parse(data.choices[0].message.content);
                        suggestionEl.innerHTML = '✦ <b>AIセルフケア提案:</b><br>' + result.careSuggestion;
                        
                        if(currentHp === 0) {
                             setTimeout(()=>alert("💥 HPがゼロになりました。" + result.careSuggestion), 500);
                        }
                    }
                } catch(e) {
                    suggestionEl.classList.add('hidden');
                }
            }
        }

        // Settings Modal
        window.toggleSettings = function() {
            const modal = document.getElementById('settings-modal');
            const panel = document.getElementById('settings-panel');
            
            if (modal.classList.contains('pointer-events-none')) {
                modal.classList.remove('pointer-events-none');
                requestAnimationFrame(() => {
                    modal.classList.remove('opacity-0');
                    panel.classList.remove('translate-y-full');
                });
                
                const savedKey = localStorage.getItem('tenteki_api_key');
                if (savedKey) {
                    document.getElementById('api-key-input').value = savedKey;
                }
            } else {
                modal.classList.add('opacity-0');
                panel.classList.add('translate-y-full');
                setTimeout(() => {
                    modal.classList.add('pointer-events-none');
                }, 300); // Wait for transition
            }
        }

        window.saveApiKey = function() {
            const keyInput = document.getElementById('api-key-input');
            const key = keyInput.value.trim();
            
            if (key) {
                localStorage.setItem('tenteki_api_key', key);
                showToast('APIキーを保存しました。');
                document.getElementById('api-warning').classList.add('hidden');
                toggleSettings();
            } else {
                localStorage.removeItem('tenteki_api_key');
                showToast('APIキーをクリアしました。', true);
                toggleSettings();
            }
        }

        function showToast(message, isWarning = false) {
            const toast = document.createElement('div');
            toast.className = 'fixed top-8 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-2xl glass-panel z-[60] transition-all duration-500 text-sm font-medium flex items-center shadow-2xl border ' + (isWarning ? 'border-amber-500/50' : 'border-green-500/50');
            toast.style.opacity = '0';
            toast.style.transform = 'translate(-50%, -20px)';
            
            const dotColor = isWarning ? 'bg-amber-400' : 'bg-green-400';
            toast.innerHTML = '<span class="w-2 h-2 rounded-full ' + dotColor + ' mr-3 shadow-[0_0_8px_currentColor]"></span><span class="' + (isWarning ? 'text-amber-100' : 'text-zinc-100') + '">' + message + '</span>';
            
            document.body.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.style.opacity = '1';
                toast.style.transform = 'translate(-50%, 0)';
            });
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -20px)';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // Initialize App
        window.onload = function() {
            updateHpDisplay();
            const savedKey = localStorage.getItem('tenteki_api_key');
            if (!savedKey) {
                document.getElementById('api-warning').classList.remove('hidden');
            }
        };

        window.resetApp = function() {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('result-area').classList.add('hidden');
            const profiling = document.getElementById('profiling-section');
            profiling.classList.remove('hidden');
            
            profiling.classList.remove('animate-slide-up');
            void profiling.offsetWidth;
            profiling.classList.add('animate-slide-up');

            document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
            currentAstrologyContext = null;
            document.getElementById('healing-suggestion').classList.add('hidden');
        }

        window.generateFortune = async function() {
            const apiKey = localStorage.getItem('tenteki_api_key');
            
            if (!apiKey) {
                document.getElementById('api-warning').classList.remove('hidden');
                toggleSettings();
                return;
            }

            const userName = document.getElementById('user-name').value.trim() || 'あなた';
            const userBday = document.getElementById('user-birthday').value;
            const enemyName = document.getElementById('enemy-name').value.trim() || '名無しモンスター';
            const enemyBday = document.getElementById('enemy-birthday').value;

            if (!userBday || !enemyBday) {
                showToast('生年月日の入力は必須です。', true);
                return;
            }
            
            // Save state for healing suggestions
            currentAstrologyContext = {
                user: { name: userName, birthday: userBday },
                enemy: { name: enemyName, birthday: enemyBday }
            };

            document.getElementById('profiling-section').classList.add('hidden');
            
            const loadingMenu = document.getElementById('loading-state');
            loadingMenu.classList.remove('hidden');
            loadingMenu.classList.remove('animate-slide-up');
            void loadingMenu.offsetWidth;
            loadingMenu.classList.add('animate-slide-up');
            
            document.getElementById('result-area').classList.add('hidden');
            document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });

            const systemPrompt = "あなたは占星術・バイオリズムを熟知した「天敵・天気予報士」です。\\n" +
"ユーザーと天敵の「名前」と「生年月日」をもとに、今日の天敵のコンディションと、被害を最小限に抑える回避アクションを推測してください。\\n" +
"出力はクスッと笑える、ブラックユーモアの効いた天気予報風のトーンにしてください。\\n" +
"出力は必ずJSON形式にしてください。\\n\\n" +
"【JSONの形式】\\n" +
"{\\n" +
"  \"weatherForecast\": \"今日の天敵・天気予報の短い見出し (例: 『大荒れ』〜星回り的にイライラ度MAX〜)\",\\n" +
"  \"prediction\": \"詳細なコンディション予測 (例: 今日は承認欲求が高まっているので、おだてればチョロい『快晴』です。しかし、過去の話をし始めたら落雷の合図...)\",\\n" +
"  \"tips\": [\\n" +
"    \"具体的な回避アクションやクスッとくる対策1 (例: 「さすがですね」の相槌を通常の3倍に設定してください)\",\\n" +
"    \"対策2 (例: 今日は絶対に目を合わせてはいけません)\",\\n" +
"    \"ラッキーアイテム (例: ラッキーアイテムは『ノイズキャンセリングイヤホン』です)\"\\n" +
"  ]\\n" +
"}";

            const userPrompt = "\\n" +
"本日の日付：" + dateStr + "\\n\\n" +
"【ユーザー情報】\\n" +
"・名前: " + userName + "\\n" +
"・生年月日: " + userBday + "\\n\\n" +
"【天敵情報】\\n" +
"・名前: " + enemyName + "\\n" +
"・生年月日: " + enemyBday + "\\n\\n" +
"本日の天敵の天気予報と対策を教えてください。";

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + apiKey
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userPrompt }
                        ],
                        response_format: { type: "json_object" },
                        temperature: 0.8,
                        max_tokens: 600
                    })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error((errData.error && errData.error.message) || 'HTTPエラー: ' + response.status);
                }

                const data = await response.json();
                const content = data.choices[0].message.content;
                const result = JSON.parse(content);
                
                document.getElementById('danger-level').innerText = result.weatherForecast || "☁️ 測定不能";
                document.getElementById('enemy-prediction').innerHTML = result.prediction.replace(/\\n/g, '<br>') || "予測データの解析に失敗しました。";
                
                const tipsList = result.tips || ["物理的に距離をとる", "気配を消す", "無心でうなずく"];
                const tipsHtml = tipsList.map(tip => 
                    '<li class="flex items-start bg-white/5 p-4 rounded-xl border border-white/10 hover:bg-white/10 transition-colors duration-300">' +
                    '<span class="mr-3 mt-0.5 rounded-full bg-amber-400 shrink-0 w-1.5 h-1.5 shadow-[0_0_8px_rgba(251,191,36,0.8)]"></span>' +
                    '<span class="leading-relaxed opacity-90 text-[13px]">' + tip + '</span>' +
                    '</li>'
                ).join('');
                document.getElementById('survival-tips').innerHTML = tipsHtml;

                // Minimum delay for loading animation styling
                setTimeout(() => {
                    document.getElementById('loading-state').classList.add('hidden');
                    const resultArea = document.getElementById('result-area');
                    resultArea.classList.remove('hidden');
                    
                    resultArea.style.display = 'none';
                    void resultArea.offsetHeight;
                    resultArea.style.display = '';

                }, 1000);

            } catch (error) {
                console.error("API Error:", error);
                const msg = error.message.toLowerCase();
                if (msg.includes('api key') || msg.includes('unauthorized') || msg.includes('401')) {
                    showToast('Invalid API Key provided.', true);
                    toggleSettings();
                } else {
                    alert('APIエラー発生:\n詳細: ' + error.message);
                }
                resetApp();
            }
        }
    </script>
</body>
</html>
